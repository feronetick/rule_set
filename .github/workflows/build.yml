name: Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Get config from private repo
        run: |
          curl -H "Authorization: token ${{ secrets.GH_PERSONAL_TOKEN }}" \
                -H "Accept: application/vnd.github.v3.raw" \
                ${{ secrets.GH_API_FILE_URL }} > config.json
          echo "CONFIG<<EOF" >> $GITHUB_ENV
          cat ./config.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install axios

      - name: Process Rules
        run: node process-rules.js

      - name: Install sing-box
        run: |
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION/v/}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          rm -rf sing-box-* sing-box.tar.gz

      - name: Convert JSON to SRS
        run: |
          for file in *.json; do
            # пропускаем служебные файлы
            [[ "$file" == "config.json" || "$file" == "package.json" || "$file" == "package-lock.json" ]] && continue
            output="${file%.json}.srs"
            echo "Converting $file → $output"
            sing-box rule-set compile "$file" -o "$output"
          done

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Clone domain-list-community builder
        run: git clone --depth=1 https://github.com/v2fly/domain-list-community.git dlc-builder

      - name: Build geosite.dat
        run: |
          mkdir -p dat-output
          mkdir -p dlc-data

          # Каждый *.geosite.txt становится тегом в geosite.dat
          # proxy.geosite.txt → тег "proxy"
          found=0
          for geosite_file in *.geosite.txt; do
            [ -f "$geosite_file" ] || continue
            tag="${geosite_file%.geosite.txt}"
            echo "Adding geosite: $geosite_file → tag '$tag'"
            cp "$geosite_file" "dlc-data/${tag}"
            found=1
          done

          if [ "$found" -eq 0 ]; then
            echo "⚠️ No .geosite.txt files found, skipping geosite.dat"
          else
            cd dlc-builder
            go mod download
            go run ./ \
              --datapath="../dlc-data" \
              --outputname="geosite.dat" \
              --outputdir="../dat-output"
            echo "✅ geosite.dat created"
          fi

      - name: Build geoip.dat
        run: |
          mkdir -p dat-output

          # Проверяем наличие .geoip.txt файлов
          found=0
          for geoip_file in *.geoip.txt; do
            [ -f "$geoip_file" ] || continue
            found=1
            break
          done

          if [ "$found" -eq 0 ]; then
            echo "⚠️ No .geoip.txt files found, skipping geoip.dat"
            exit 0
          fi

          go install -v github.com/Loyalsoldier/geoip@latest

          # Динамически генерируем config.json для geoip CLI
          # proxy.geoip.txt → тег "proxy"
          inputs="[]"
          for geoip_file in *.geoip.txt; do
            [ -f "$geoip_file" ] || continue
            tag="${geoip_file%.geoip.txt}"
            abs_path="$(pwd)/${geoip_file}"
            echo "Adding geoip: $geoip_file → tag '$tag'"
            inputs=$(echo "$inputs" | jq \
              --arg tag "$tag" \
              --arg uri "$abs_path" \
              '. += [{"type": "text", "action": "add", "args": {"name": $tag, "uri": $uri}}]'
            )
          done

          jq -n \
            --argjson inputs "$inputs" \
            --arg outdir "$(pwd)/dat-output" \
            '{
              "input": $inputs,
              "output": [{
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputDir": $outdir,
                  "outputName": "geoip.dat"
                }
              }]
            }' > geoip-convert-config.json

          echo "=== geoip-convert-config.json ==="
          cat geoip-convert-config.json

          geoip convert -c geoip-convert-config.json
          echo "✅ geoip.dat created"

      - name: Verify DAT output
        run: |
          echo "=== Generated files ==="
          ls -lh dat-output/ || echo "dat-output/ is empty"

          for dat_file in dat-output/*.dat; do
            [ -f "$dat_file" ] || continue
            size=$(stat -c%s "$dat_file")
            echo "$dat_file — ${size} bytes"
            if [ "$size" -lt 100 ]; then
              echo "❌ ERROR: $dat_file is suspiciously small!"
              exit 1
            fi
          done
          echo "✅ All DAT files look good"

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update rule sets
          file_pattern: '*.srs dat-output/*.dat package-lock.json'
