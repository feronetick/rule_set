name: Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Get config from private repo
        run: |
          curl -H "Authorization: token ${{ secrets.GH_PERSONAL_TOKEN }}" \
                -H "Accept: application/vnd.github.v3.raw" \
                ${{ secrets.GH_API_FILE_URL }} > config.json
          echo "CONFIG<<EOF" >> $GITHUB_ENV
          cat ./config.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install axios

      - name: Process Rules
        run: |
          mkdir -p dlc-data geoip-data dat-output
          node process-rules.js

      - name: Install sing-box
        run: |
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION/v/}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          rm -rf sing-box-* sing-box.tar.gz

      - name: Convert to SRS
        run: |
          for file in *-rules.json; do
            output="${file%.json}.srs"
            echo "Converting $file to $output"
            sing-box rule-set compile "$file" -o "$output"
          done

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Clone domain-list-community builder
        run: git clone --depth=1 https://github.com/v2fly/domain-list-community.git dlc-builder

      - name: Build geosite.dat
        run: |
          if [ -z "$(ls dlc-data/ 2>/dev/null)" ]; then
            echo "⚠️ No domain rules found, skipping geosite.dat"
            exit 0
          fi

          echo "=== dlc-data contents ==="
          ls -lh dlc-data/
          wc -l dlc-data/*

          cd dlc-builder
          go mod download
          go run ./ \
            --datapath="../dlc-data" \
            --outputname="geosite.dat" \
            --outputdir="../dat-output"

      - name: Build geoip.dat
        run: |
          if [ -z "$(ls geoip-data/ 2>/dev/null)" ]; then
            echo "⚠️ No IP rules found, skipping geoip.dat"
            exit 0
          fi

          echo "=== geoip-data contents ==="
          ls -lh geoip-data/
          wc -l geoip-data/*

          go install -v github.com/Loyalsoldier/geoip@latest

          inputs="[]"
          for ip_file in geoip-data/*; do
            tag="$(basename "$ip_file")"
            uri="$(pwd)/$ip_file"
            echo "Adding geoip input: tag=${tag}, uri=${uri}"
            inputs=$(echo "$inputs" | jq \
              --arg tag "$tag" \
              --arg uri "$uri" \
              '. += [{"type": "text", "action": "add", "args": {"name": $tag, "uri": $uri}}]'
            )
          done

          jq -n \
            --argjson inputs "$inputs" \
            --arg outdir "$(pwd)/dat-output" \
            '{
              "input": $inputs,
              "output": [{
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputDir": $outdir,
                  "outputName": "geoip.dat"
                }
              }]
            }' > geoip-convert-config.json

          echo "=== geoip-convert-config.json ==="
          cat geoip-convert-config.json

          geoip convert -c geoip-convert-config.json

      - name: Verify DAT output
        run: |
          echo "=== Generated DAT files ==="
          ls -lh dat-output/

          found=0
          for dat_file in dat-output/*.dat; do
            [ -f "$dat_file" ] || continue
            found=1
            size=$(stat -c%s "$dat_file")
            echo "$dat_file — ${size} bytes"
            if [ "$size" -lt 100 ]; then
              echo "❌ ERROR: $dat_file is suspiciously small!"
              exit 1
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "❌ ERROR: No .dat files were generated!"
            exit 1
          fi

          echo "✅ All DAT files look good"

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update rule sets
          file_pattern: '*.srs dat-output/*.dat package-lock.json'
