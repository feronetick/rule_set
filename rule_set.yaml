version: 1
rules:
  - type: logical
    mode: or
    rules:
      - protocol: [bittorrent]
      - geosite: [private, whatsapp, blizzard]
      - domain_suffix: [ipleak]
    outbound: direct

  - type: logical
    mode: or
    rules:
      - domain_suffix:
          - ai.google.dev
          - gemini.google.com
          - aistudio.google.com
          - googleusercontent.com
          - googleapis.com
          - api.githubcopilot.com
          - proton.me
          - chub.ai
          - vpngen.org
          - redgifs.com
          - patreon.com
      - geosite:
          - youtube
          - openai
          - adguard
          - anthropic
          - digitalocean
          - firebase
          - gitlab
          - gravatar
          - linkedin
          - discord
          - medium
          - meta
          - netflix
          - openwrt
          - quora
          - redis
          - slack
          - soundcloud
          - spotify
          - tmdb
      - domain_keyword:
          - kinozal
          - rutracker
      - domain_regex:
          - ".*\\.ai\\.google\\.(com|dev)$"
          - ".*\\.clients[0-9]+\\.google\\.com"
    outbound: proxy

  - type: ip_cidr
    ip_cidr:
      - 1.1.1.1/32
      - 8.8.8.8/32
      - 185.121.234.193/32
      - 34.0.0.0/16
      - 35.207.0.0/16
      - 35.214.0.0/16
      - 35.217.0.0/16
      - 35.219.0.0/16
      - 5.200.14.0/24
      - 66.22.196.0/24
      - 66.22.197.0/24
      - 66.22.198.0/24
      - 66.22.199.0/24
      - 66.22.216.0/24
      - 66.22.217.0/24
      - 66.22.237.0/24
      - 66.22.238.0/24
      - 66.22.241.0/24
      - 66.22.243.0/24
      - 66.22.244.0/24
    outbound: proxy

  - type: default
    outbound: direct
